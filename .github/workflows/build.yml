name: Build MobileGlues for iOS
on: [push, workflow_dispatch]
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build MobileGlues
        run: |
          cd MobileGlues-cpp
          curl -L https://github.com/leetal/ios-cmake/raw/master/ios.toolchain.cmake -o ios.toolchain.cmake
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake \
            -DSTATICLIB=OFF \
            -DMACOS=ON \
            -DPLATFORM=OS64 \
            -DCMAKE_C_FLAGS="-Wno-error=implicit-function-declaration" \
            -DCMAKE_FRAMEWORK_PATH="${PWD}/external"
          cmake --build build --config RelWithDebInfo --target mobileglues
          codesign -s - build/libmobileglues.dylib

      - name: Upload lib
        uses: actions/upload-artifact@v4
        with:
          name: MobileGlues-iOS-dylib
          path: MobileGlues-cpp/build/libmobileglues.dylib
